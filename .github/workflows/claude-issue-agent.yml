name: Claude Issue Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       github.event.issue.pull_request == null)
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Strip /messages suffix from base URL
        id: base-url
        run: |
          url="${{ secrets.ANTHROPIC_BASE_URL }}"
          url="${url%/messages}"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ steps.base-url.outputs.url }}
        with:
          trigger_phrase: "@claude"
          anthropic_api_key: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            Analyze the issue and any comments to understand what is being asked.
            If code changes are requested, implement them and create a pull request.
            Reference the issue number in the PR description.
            If only a question or analysis is asked, respond with a comment instead.
