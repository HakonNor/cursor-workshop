name: Claude Issue Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  claude-respond:
    runs-on: ubuntu-latest
    # Only run if @claude is mentioned in the issue body or comment
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      issues: write
      contents: read

    steps:
      - name: Post "thinking" reaction
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'issue_comment') {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'eyes',
              });
            } else {
              await github.rest.reactions.createForIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                content: 'eyes',
              });
            }

      - name: Fetch full issue context
        id: issue-context
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });

            const commentThread = comments.data.map(c =>
              `**@${c.user.login}:** ${c.body}`
            ).join('\n\n---\n\n');

            const trigger = context.eventName === 'issue_comment'
              ? context.payload.comment.body
              : issue.body;

            const fullContext = [
              `Repository: ${context.repo.owner}/${context.repo.repo}`,
              `Issue #${issue.number}: ${issue.title}`,
              `Opened by: @${issue.user.login}`,
              `Labels: ${issue.labels.map(l => l.name).join(', ') || 'none'}`,
              '',
              '## Issue body',
              issue.body || '(empty)',
              '',
              '## Comment thread',
              commentThread || '(no comments yet)',
              '',
              '## Your task',
              `Respond to the following message from @${context.payload.sender.login}:`,
              trigger,
            ].join('\n');

            core.setOutput('context', fullContext);
            core.setOutput('issue_number', issue.number);

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Call Claude via AI Foundry
        id: claude
        env:
          AZURE_AI_ENDPOINT: ${{ secrets.ANTHROPIC_BASE_URL }}
          AZURE_AI_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ISSUE_CONTEXT: ${{ steps.issue-context.outputs.context }}
        run: |
          python - <<'EOF'
          import os
          import requests

          endpoint = os.environ["AZURE_AI_ENDPOINT"].strip().rstrip("/")
          api_key = os.environ["AZURE_AI_API_KEY"].strip()

          # Log endpoint domain for debugging (no key exposed)
          from urllib.parse import urlparse
          parsed = urlparse(endpoint)
          print(f"Calling endpoint: {parsed.scheme}://{parsed.netloc}{parsed.path}/chat/completions")

          url = f"{endpoint}/chat/completions"

          headers = {
              "api-key": api_key,
              "Content-Type": "application/json",
          }

          payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 4096,
              "messages": [
                  {
                      "role": "system",
                      "content": (
                          "You are a helpful AI assistant working inside a GitHub repository. "
                          "You are responding to issues and comments where users have tagged @claude. "
                          "Be concise, helpful, and technical. Format your responses in Markdown. "
                          "When suggesting code changes, include file paths and code blocks. "
                          "End your response with a brief note that you are an AI assistant."
                      ),
                  },
                  {
                      "role": "user",
                      "content": os.environ["ISSUE_CONTEXT"],
                  },
              ],
          }

          response = requests.post(url, headers=headers, json=payload, timeout=120)

          if not response.ok:
              print(f"HTTP {response.status_code}: {response.text}")
              response.raise_for_status()

          text = response.json()["choices"][0]["message"]["content"]

          with open("/tmp/claude_response.md", "w") as f:
              f.write(text)

          print("Claude responded successfully.")
          EOF

      - name: Post Claude's response as a comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = fs.readFileSync('/tmp/claude_response.md', 'utf8');
            const issueNumber = parseInt('${{ steps.issue-context.outputs.issue_number }}');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `> 🤖 Claude was asked to help here.\n\n${response}`,
            });

      - name: Handle failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.issue-context.outputs.issue_number }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: '> ⚠️ @claude was mentioned but the agent failed to respond. Check the [Actions log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
            });
